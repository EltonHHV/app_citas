<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicitas - Error del Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Google Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fcfcfc;
            color: #202124;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            font-size: 2.8rem;
            color: #202124;
            margin-bottom: 20px;
            font-weight: 400;
        }
        p {
            font-size: 1.2rem;
            color: #5f6368;
            margin-bottom: 30px;
        }
        .btn-soporte {
            display: inline-block;
            padding: 12px 24px;
            font-size: 1.1rem;
            color: #1a73e8;
            background-color: transparent;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s ease;
            font-weight: 500;
        }
        .btn-soporte:hover {
            background-color: #f8f9fa;
        }
        .contact-info {
            font-size: 1.1rem;
            color: #5f6368;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Medicitas se tomó un descanso</h1>
        <p>Espera un momento y vuelve a intentarlo más tarde.</p>
        
        <div class="contact-info">
            Contactar con soporte del sistema
        </div>
        <br><br>
        <a href="javascript:history.back()" class="btn-soporte">Volver atrás</a>
    </div>
</body>
</html>
